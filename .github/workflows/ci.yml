name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/stratoclave_distill

      - name: Unit tests
        run: pytest -q --cov=stratoclave_distill --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: distill
          POSTGRES_PASSWORD: distill
          POSTGRES_DB: distill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U distill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install psycopg[binary]

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://distill:distill@localhost:5432/distill
        run: alembic upgrade head

      - name: Integration tests
        env:
          DISTILL_TEST_DATABASE_URL: postgresql+psycopg://distill:distill@localhost:5432/distill
        run: pytest -q -m integration tests/integration
